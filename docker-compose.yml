

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: anam_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
      TZ: Asia/Karachi
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: .
    container_name: anam_backend
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      - db
    environment:
      # We override the DB host to point to the 'db' container name instead of localhost
      - DB_HOST=db
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_NAME=postgres
      - DB_PORT=5432
    volumes:
      # Mount the storage directory so uploaded documents persist if the container restarts
      - ./storage:/root/storage

volumes:
  pgdata: